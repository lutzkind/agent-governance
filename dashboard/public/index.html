<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Agent Governance Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #e0e0e0;
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    
    header {
      margin-bottom: 40px;
      text-align: center;
    }
    
    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #00d4ff, #0099ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .subtitle {
      color: #888;
      font-size: 1em;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    
    .stat-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 8px;
      padding: 20px;
      backdrop-filter: blur(10px);
    }
    
    .stat-value {
      font-size: 2.5em;
      font-weight: bold;
      color: #00d4ff;
      margin-bottom: 10px;
    }
    
    .stat-label {
      color: #aaa;
      font-size: 0.9em;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .section {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 30px;
      backdrop-filter: blur(10px);
    }
    
    h2 {
      color: #00d4ff;
      margin-bottom: 20px;
      font-size: 1.5em;
      border-bottom: 2px solid rgba(0, 212, 255, 0.3);
      padding-bottom: 10px;
    }
    
    .learning-item {
      background: rgba(0, 0, 0, 0.2);
      border-left: 4px solid #00d4ff;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 4px;
    }
    
    .learning-title {
      font-weight: bold;
      color: #fff;
      margin-bottom: 5px;
    }
    
    .learning-meta {
      display: flex;
      gap: 15px;
      font-size: 0.85em;
      color: #999;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    
    .learning-meta span {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75em;
      font-weight: bold;
      text-transform: uppercase;
    }
    
    .status-pending {
      background: rgba(255, 193, 7, 0.2);
      color: #ffc107;
    }
    
    .status-approved {
      background: rgba(76, 175, 80, 0.2);
      color: #4caf50;
    }
    
    .status-rejected {
      background: rgba(244, 67, 54, 0.2);
      color: #f44336;
    }
    
    .votes {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }
    
    .vote {
      background: rgba(0, 0, 0, 0.3);
      padding: 8px;
      border-radius: 4px;
      font-size: 0.8em;
      text-align: center;
    }
    
    .vote.approved {
      border-left: 3px solid #4caf50;
      color: #4caf50;
    }
    
    .vote.pending {
      border-left: 3px solid #999;
      color: #999;
    }
    
    .agent-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
    }
    
    .agent-card {
      background: rgba(0, 0, 0, 0.2);
      padding: 15px;
      border-radius: 8px;
      border-left: 4px solid #0099ff;
      text-align: center;
    }
    
    .agent-name {
      font-weight: bold;
      color: #fff;
      margin-bottom: 5px;
    }
    
    .agent-count {
      font-size: 2em;
      color: #00d4ff;
      margin-bottom: 5px;
    }
    
    .agent-label {
      font-size: 0.75em;
      color: #999;
      text-transform: uppercase;
    }
    
    button {
      background: linear-gradient(135deg, #00d4ff, #0099ff);
      border: none;
      color: #fff;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: opacity 0.3s;
      margin-right: 10px;
    }
    
    button:hover {
      opacity: 0.8;
    }
    
    .loading {
      text-align: center;
      color: #00d4ff;
      padding: 40px;
    }
    
    .error {
      background: rgba(244, 67, 54, 0.1);
      border: 1px solid rgba(244, 67, 54, 0.3);
      color: #f44336;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🤖 AI Agent Governance</h1>
      <p class="subtitle">Cross-agent consensus voting & continuous improvement</p>
    </header>
    
    <div id="stats-container" class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="stat-instructions">-</div>
        <div class="stat-label">Instructions</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-learnings">-</div>
        <div class="stat-label">Total Learnings</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-pending">-</div>
        <div class="stat-label">Pending Votes</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-approved">-</div>
        <div class="stat-label">Approved</div>
      </div>
    </div>
    
    <div class="section">
      <h2>📊 Agent Contributions</h2>
      <div class="agent-list" id="agents-container">
        <div class="loading">Loading...</div>
      </div>
    </div>
    
    <div class="section">
      <h2>💡 Recent Learnings</h2>
      <div id="learnings-container">
        <div class="loading">Loading...</div>
      </div>
    </div>
    
    <div style="text-align: center; color: #666; margin-top: 40px; padding-bottom: 20px;">
      <p>Registry: ~/.config/ai-agents/registry.json</p>
      <p style="font-size: 0.8em;">Updated: <span id="last-updated">--</span></p>
    </div>
  </div>
  
  <script>
    async function loadStats() {
      try {
        const res = await fetch('/api/stats');
        const stats = await res.json();
        
        document.getElementById('stat-instructions').textContent = stats.total_instructions;
        document.getElementById('stat-learnings').textContent = stats.total_learnings;
        document.getElementById('stat-pending').textContent = stats.learnings_pending;
        document.getElementById('stat-approved').textContent = stats.learnings_approved;
        document.getElementById('last-updated').textContent = new Date(stats.last_updated).toLocaleString();
        
        // Render agents
        const agentHtml = Object.entries(stats.agent_contributions)
          .sort((a, b) => b[1] - a[1])
          .map(([agent, count]) => `
            <div class="agent-card">
              <div class="agent-name">${agent}</div>
              <div class="agent-count">${count}</div>
              <div class="agent-label">Learnings</div>
            </div>
          `).join('');
        
        document.getElementById('agents-container').innerHTML = agentHtml || '<p style="color: #999;">No agent data yet</p>';
      } catch (e) {
        console.error('Error loading stats:', e);
      }
    }
    
    async function loadLearnings() {
      try {
        const res = await fetch('/api/learnings');
        const learnings = await res.json();
        
        const html = learnings.slice(0, 20).map(l => `
          <div class="learning-item">
            <div class="learning-title">${l.title}</div>
            <div class="learning-meta">
              <span>🤖 ${l.origin_agent}</span>
              <span>📌 ${l.affects_instruction}</span>
              <span>🎯 ${(l.confidence * 100).toFixed(0)}% confidence</span>
              <span class="status-badge status-${l.status}">${l.status}</span>
            </div>
            <p>${l.description}</p>
            ${l.votes ? `
              <div class="votes">
                ${Object.entries(l.votes).map(([agent, vote]) => `
                  <div class="vote ${vote === 'approve' ? 'approved' : 'pending'}">
                    ${agent}: ${vote}
                  </div>
                `).join('')}
              </div>
            ` : ''}
          </div>
        `).join('');
        
        document.getElementById('learnings-container').innerHTML = html || '<p style="color: #999;">No learnings yet</p>';
      } catch (e) {
        console.error('Error loading learnings:', e);
      }
    }
    
    // Initial load
    loadStats();
    loadLearnings();
    
    // Refresh every 30 seconds
    setInterval(() => {
      loadStats();
      loadLearnings();
    }, 30000);
  </script>
</body>
</html>
